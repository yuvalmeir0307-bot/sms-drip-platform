[build]
builder = "NIXPACKS"
buildCommand = "npm install && npx prisma generate"

[[services]]
name = "campaign-worker"
startCommand = "npx ts-node --project tsconfig.workers.json workers/campaign-worker.ts"

[[services]]
name = "notion-poller"
startCommand = "npx ts-node --project tsconfig.workers.json workers/notion-poller.ts"
